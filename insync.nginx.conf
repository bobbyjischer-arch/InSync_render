server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP → HTTPS (uncomment after getting SSL cert)
    # return 301 https://$host$request_uri;

    # ── Static files served directly by nginx (no Python overhead) ──────────
    location /static/ {
        alias /opt/insync/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon — serve from static or return 204 to silence logs ───────────
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # ── Proxy everything else to uvicorn ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Upload limit for avatars
        client_max_body_size 6M;

        # Timeouts
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}

