<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход по коду — InSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-3 sm:p-4 md:p-10 flex flex-col justify-center items-center min-h-screen gap-3 sm:gap-4">
    {# BUG FIX 8: back arrow #}
    <div class="w-full max-w-md">
        <a href="/" class="text-gray-400 hover:text-white inline-flex items-center gap-2 transition-colors group text-sm sm:text-base">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> На главную
        </a>
    </div>

    <div class="max-w-md w-full glass p-6 sm:p-8 md:p-12">
        <h1 class="text-2xl sm:text-3xl font-black mb-6 sm:mb-8 text-center">Введите код</h1>
        {% if request.query_params.get('err') %}
            <p class="text-red-400 text-xs sm:text-sm text-center mb-4 bg-red-500/10 border border-red-500/30 rounded-xl p-3">
                Событие с таким кодом не найдено
            </p>
        {% endif %}
        <form method="post" class="space-y-4 sm:space-y-6">
            <input type="text" name="invite_code" required placeholder="XXXXXX"
                   class="w-full bg-black/20 border border-white/10 p-3 sm:p-4 rounded-xl text-center text-xl sm:text-2xl tracking-widest uppercase">
            <button type="submit"
                    class="w-full bg-indigo-600 py-3 sm:py-4 rounded-xl font-bold hover:bg-indigo-500 transition text-sm sm:text-base">
                Войти
            </button>
        </form>
    </div>
</body>
</html>
